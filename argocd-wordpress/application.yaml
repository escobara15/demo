apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wordpress-demo
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/escobara15/demo.git
    targetRevision: main
    path: wordpress-app
  destination:
    server: https://kubernetes.default.svc
    namespace: wp-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true